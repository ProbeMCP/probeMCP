name: Repository metadata

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/labels.yml"
      - ".github/milestones.md"
      - ".github/workflows/repo-metadata.yml"

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Sync labels milestones and backlog metadata
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Sync metadata
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const labels = [
              ["needs-triage", "cfd3d7", "Needs maintainer review and release/area classification."],
              ["type:bug", "d73a4a", "Reproducible defect or regression."],
              ["type:feature", "a2eeef", "New user-facing capability or workflow."],
              ["type:research", "d4c5f9", "Investigation before implementation."],
              ["area:mcp", "1d76db", "MCP protocol, tools, resources, or client compatibility."],
              ["area:backend", "0e8a16", "GDB-compatible debugger backend adapters."],
              ["area:safety", "b60205", "Permission model, interlocks, confirmations, or auditability."],
              ["area:analyzer", "fbca04", "Fault, symbol, RTOS, SVD, or state analyzers."],
              ["area:docs", "0075ca", "Documentation, examples, or release process."],
              ["area:tests", "5319e7", "CI, fixtures, fuzzing, compatibility, or regression tests."],
              ["needs-hardware", "e99695", "Requires physical target, probe, or vendor debug server validation."],
              ["needs-transcript", "fef2c0", "Needs sanitized GDB/MI transcript evidence."],
              ["good-first-issue", "7057ff", "Suitable for a first contribution with clear scope."]
            ];
            for (const [name, color, description] of labels) {
              try {
                await github.rest.issues.updateLabel({ owner, repo, name, color, description });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }

            const milestoneTitles = ["v0.1", "v0.2", "future", "research"];
            const milestones = new Map();
            for (const title of milestoneTitles) {
              const existing = await github.paginate(github.rest.issues.listMilestones, {
                owner,
                repo,
                state: "all",
              });
              let milestone = existing.find((item) => item.title === title);
              if (!milestone) {
                const created = await github.rest.issues.createMilestone({ owner, repo, title });
                milestone = created.data;
              }
              milestones.set(title, milestone.number);
            }

            const plan = [
              [8, "v0.1", ["area:tests", "area:backend"]],
              [9, "v0.1", ["area:backend"]],
              [10, "v0.1", ["area:mcp"]],
              [11, "v0.1", ["area:tests", "area:backend"]],
              [12, "v0.1", ["area:analyzer"]],
              [13, "v0.1", ["area:backend", "area:safety", "needs-hardware"]],
              [14, "v0.1", ["area:analyzer"]],
              [15, "v0.1", ["area:backend"]],
              [16, "v0.1", ["area:safety"]],
              [17, "v0.1", ["area:backend", "area:tests"]],
              [18, "v0.1", ["area:backend", "needs-hardware"]],
              [19, "v0.1", ["area:tests", "area:backend"]],
              [20, "v0.1", ["area:mcp"]],
              [21, "v0.1", ["area:safety"]],
              [22, "v0.1", ["area:docs", "area:mcp"]],
              [23, "v0.1", ["area:safety", "area:backend"]],
              [24, "v0.2", ["area:analyzer"]],
              [25, "v0.2", ["area:backend", "area:safety"]],
              [26, "v0.2", ["area:analyzer"]],
              [27, "v0.2", ["area:mcp", "area:analyzer"]],
              [28, "v0.2", ["area:analyzer"]],
              [29, "v0.2", ["area:analyzer"]],
              [30, "v0.2", ["area:backend"]],
              [31, "v0.1", ["area:docs"]],
              [32, "v0.2", ["area:safety"]],
              [33, "v0.2", ["area:backend"]],
              [34, "future", ["area:docs"]],
              [35, "research", ["type:research", "area:backend", "needs-hardware"]],
              [36, "v0.2", ["area:tests", "area:backend", "needs-transcript"]],
              [37, "v0.1", ["area:backend", "area:safety"]],
              [38, "future", ["area:safety", "area:docs"]],
              [39, "v0.2", ["area:mcp"]],
              [40, "v0.2", ["area:safety"]],
              [41, "v0.2", ["area:tests"]],
              [42, "future", ["area:safety", "area:docs"]],
              [43, "v0.2", ["area:docs", "area:mcp"]],
              [44, "v0.2", ["area:tests"]],
              [45, "v0.2", ["area:mcp", "area:safety"]],
              [46, "v0.2", ["area:tests", "area:safety"]],
              [47, "v0.2", ["area:mcp", "area:tests"]],
              [48, "future", ["area:safety", "needs-hardware"]],
              [49, "future", ["area:docs"]],
              [50, "future", ["area:docs", "area:backend"]],
              [51, "v0.2", ["area:tests"]],
              [52, "future", ["area:docs"]],
              [53, "v0.2", ["area:safety", "area:mcp"]]
            ];
            for (const [issue_number, milestone, labels] of plan) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                milestone: milestones.get(milestone),
              });
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels });
            }
